<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown & Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen">
            <h1>Crown & Coin</h1>
            <div class="form">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="secret" placeholder="Secret">
                <button id="register-btn">Register</button>
                <button id="connect-btn">Connect</button>
            </div>
            <p id="login-error" class="error"></p>
        </div>

        <div id="game-screen" class="screen hidden">
            <header>
                <h1>Crown & Coin</h1>
                <div id="header-info">
                    <span id="user-info"></span>
                    <span id="phase-info"></span>
                    <button id="logout-btn">Logout</button>
                </div>
            </header>

            <div id="game-content">
                <div id="state-panel">
                    <h2>Kingdoms</h2>
                    <div id="countries-display"></div>
                    <h2>Merchants</h2>
                    <div id="merchants-display"></div>
                </div>

                <div id="actions-panel">
                    <h2>Actions</h2>
                    <div id="actions-list"></div>
                </div>

                <div id="admin-panel" class="hidden">
                    <h2>Admin Controls</h2>

                    <div class="admin-section">
                        <h3>Connected Players</h3>
                        <div id="connected-players-list"></div>
                    </div>

                    <div class="admin-section">
                        <h3>Phase Control</h3>
                        <button id="advance-btn" class="admin-btn primary">Advance Phase</button>
                    </div>

                    <div class="admin-section">
                        <h3>Add Country</h3>
                        <input type="text" id="new-country-id" placeholder="Country Name">
                        <select id="new-monarch-id">
                            <option value="">Select Monarch...</option>
                        </select>
                        <button id="add-country-btn" class="admin-btn">Add Country</button>
                    </div>

                    <div class="admin-section">
                        <h3>Add Merchant</h3>
                        <select id="new-merchant-id">
                            <option value="">Select Merchant...</option>
                        </select>
                        <select id="merchant-country-select"></select>
                        <button id="add-merchant-btn" class="admin-btn">Add Merchant</button>
                    </div>

                    <div class="admin-section">
                        <h3>Remove Player</h3>
                        <select id="remove-player-select"></select>
                        <button id="remove-player-btn" class="admin-btn danger">Remove</button>
                    </div>
                </div>

                <div id="console-panel">
                    <h2>Console</h2>
                    <div id="console-output"></div>
                    <div class="console-input">
                        <input type="text" id="console-input" placeholder="Enter JSON payload...">
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
