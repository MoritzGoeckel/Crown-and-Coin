<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown & Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen">
            <h1>Crown & Coin</h1>

            <div class="auth-container">
                <div class="auth-pane">
                    <h2>Login</h2>
                    <div class="form">
                        <input type="text" id="login-username" placeholder="Username">
                        <input type="password" id="login-secret" placeholder="Secret">
                        <button id="login-btn">Login</button>
                    </div>
                    <p id="login-error" class="error"></p>
                </div>

                <div class="auth-divider"></div>

                <div class="auth-pane">
                    <h2>Sign Up</h2>
                    <div class="form">
                        <input type="text" id="signup-username" placeholder="Username">
                        <input type="password" id="signup-secret" placeholder="Secret">
                        <button id="signup-btn">Sign Up</button>
                    </div>
                    <p id="signup-error" class="error"></p>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <header>
                <h1>Crown & Coin</h1>
                <div id="header-info">
                    <span id="user-info"></span>
                    <span id="phase-info"></span>
                    <button id="logout-btn">Logout</button>
                </div>
            </header>

            <div id="game-content">
                <div id="state-panel">
                    <h2>Kingdoms</h2>
                    <div id="countries-display"></div>
                    <h2>Merchants</h2>
                    <div id="merchants-display"></div>
                </div>

                <div id="actions-panel">
                    <h2>Actions</h2>
                    <div id="actions-list"></div>
                    <h2>Queued Actions</h2>
                    <div id="queued-actions-list"></div>
                    <div id="rejected-actions-container" style="display: none;">
                        <h2 style="color: #ff6666;">Rejected Actions</h2>
                        <div id="rejected-actions-list"></div>
                    </div>
                </div>

                <div id="history-panel">
                    <h2>Game History</h2>
                    <div id="game-name-display"></div>
                    <div id="history-display"></div>
                </div>

                <div id="admin-panel" class="hidden">
                    <h2>Admin Controls</h2>

                    <div class="admin-section">
                        <h3>Connected Players</h3>
                        <div id="connected-players-list"></div>
                    </div>

                    <div class="admin-section">
                        <h3>Phase Control</h3>
                        <button id="advance-btn" class="admin-btn primary">Advance Phase</button>
                    </div>

                    <div class="admin-section">
                        <h3>Add Country</h3>
                        <input type="text" id="new-country-id" placeholder="Country Name">
                        <select id="new-monarch-id">
                            <option value="">Select Monarch...</option>
                        </select>
                        <button id="add-country-btn" class="admin-btn">Add Country</button>
                    </div>

                    <div class="admin-section">
                        <h3>Add Merchant</h3>
                        <select id="new-merchant-id">
                            <option value="">Select Merchant...</option>
                        </select>
                        <select id="merchant-country-select"></select>
                        <button id="add-merchant-btn" class="admin-btn">Add Merchant</button>
                    </div>

                    <div class="admin-section">
                        <h3>Remove Player</h3>
                        <select id="remove-player-select"></select>
                        <button id="remove-player-btn" class="admin-btn danger">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
